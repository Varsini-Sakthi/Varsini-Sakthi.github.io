- role: "Intern"
  org: "BioNome, Genomics & Bioinformatics Solutions"
  meta: "Jan 2023 - Apr 2023 · Bengaluru, India"
  tags: ["wet lab", "bioinformatics", "Alzheimer's disease", "ADMET", "NMDAR"]
  points:
    - "Worked on dry-lab computational research centered on drug discovery and molecular simulation. The core project, and the one that led to my first-author publication, involved docking the NMDAR receptor, a key therapeutic target in Alzheimer's disease, against six candidate phytocompounds using PyRx."
    - "After ranking candidates by binding affinity, carried the top four (curcumin, L-epicatechin, ginsenosides, and resveratrol) through ADMET profiling and structural visualization in BIOVIA Discovery Studio to assess their pharmacological viability as potential AD symptom treatments. Published in the International Journal of Biochemistry and Biomolecule Research (2023)."
    - "Also exposed to the broader computational drug-discovery toolkit: AI/ML-driven compound scoring, QSAR modeling, and pharmacophore-based screening for disease-target identification, as well as genomics-side work like SNP calling from whole-exome sequencing data and subtractive proteomics for annotating hypothetical proteins. This internship was my first real introduction to computational drug discovery, bridging molecular docking and simulation with the AI/ML methods I've since built my research career around."
    - "Focus areas: Molecular Docking · Molecular Dynamics · Drug Discovery (AI/ML) · QSAR · ADMET Profiling · Genomics"
