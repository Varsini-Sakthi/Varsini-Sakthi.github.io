- title: "SpatialFormer"
  subtitle: "Spatially-aware transformer for cell state prediction"
  tags: ["AI/ML", "spatial transcriptomics", "computational biology"]
  metric: "89-91% acc. (vs. 92.3% LR)"
  description: >-
    Designed a neighborhood-aware transformer architecture that represents
    each 10x Visium spot as a biological context sequence with its six
    spatial neighbors, using additive expression, coordinate, and
    token-type embeddings through a 2-layer, 4-head encoder. Benchmarked
    against expression-only baselines on 10x mouse brain data (2,796
    spots, 2,000 HVGs): logistic regression reached 92.3% validation
    accuracy versus 89-91% for the transformer. Attention analysis shows
    the model relies primarily on query-cell expression and uses spatial
    neighbor context as a secondary signal, an interpretable finding in
    its own right rather than a raw accuracy win. Deployed as a live
    inference app on Hugging Face Spaces with attention and gene-saliency
    visualization.
  note: >-
    Evaluated with a random, stratified spot-level train/test split.
    Because neighboring Visium spots are spatially autocorrelated, a
    spatially blocked split is the natural next step to rule out
    neighbor-level leakage.
  links:
    - label: "Live demo"
      url: "https://huggingface.co/spaces/Varsini-Sakthi/Spatialformer"
    - label: "GitHub"
      url: "https://github.com/Varsini-Sakthi"

- title: "Microglial Transcriptional Heterogeneity"
  subtitle: "Pseudobulk scRNA-seq across five developmental stages"
  tags: ["computational biology", "bioinformatics", "neurodegeneration"]
  metric: "4 programmes identified"
  description: >-
    End-to-end pseudobulk RNA-seq pipeline built with Dr. Maide Ozen (Johns
    Hopkins School of Medicine) characterizing microglial transcriptional
    heterogeneity across five developmental stages (E17–P60). Combines
    z-scored gene module scoring, PCA, differential expression, and
    pseudotime trajectory inference to identify four transcriptional
    programmes with stage-specific regulatory transitions relevant to
    neuroinflammation and brain maturation.
  links:
    - label: "GitHub"
      url: "https://github.com/Varsini-Sakthi"

- title: "scVI vs. PCA Benchmarking"
  subtitle: "Representation learning for single-cell data"
  tags: ["AI/ML", "data science", "single-cell"]
  metric: "LR: 95.1% vs. 91.4%"
  description: >-
    Trained a deep generative model (scVI VAE) on 12,012 PBMCs and
    benchmarked it against PCA using identical downstream classifiers
    (logistic regression, PyTorch MLP) to test when deep generative
    embeddings actually pay off for cell-type classification. PCA matched
    or exceeded scVI on raw classification accuracy (95.1% vs. 91.4%;
    5-fold CV 88.6% vs. 86.1%), while scVI's embeddings were more
    biologically coherent, highlighting conditions where deep generative
    models provide biological advantages despite not improving downstream
    classification accuracy.
  links:
    - label: "GitHub"
      url: "https://github.com/Varsini-Sakthi"

- title: "Brain Tumor MRI Classification"
  subtitle: "Radiomics with interpretable ML (preliminary)"
  tags: ["AI/ML", "data science", "medical imaging"]
  metric: "97.4% acc. (pilot, n=3 patients)"
  description: >-
    Preliminary ML pipeline for multiclass brain tumor classification from
    MRI radiomics features, on a subset of the Cheng et al. dataset (766
    image slices from 3 patients). Trained and tuned Logistic Regression,
    Random Forest, and XGBoost with RandomizedSearchCV and cross-validation
    (XGBoost 97.4%, Random Forest 95.5% on this subset), then applied SHAP
    to surface the most predictive radiomic features.
  note: >-
    This subset is heavily patient-imbalanced and the current split is
    per-image rather than patient-grouped, so the reported accuracy likely
    overstates real-world performance; class imbalance also means a
    trivial baseline already scores near 92%. Patient-level
    cross-validation and validation on the full 233-patient dataset are
    the immediate next steps.
  links:
    - label: "GitHub"
      url: "https://github.com/Varsini-Sakthi"

- title: "Genome Mining of Streptomyces Metabolites"
  subtitle: "ML-driven antifungal drug discovery"
  tags: ["wet lab", "computational biology", "drug discovery"]
  metric: "Published · 2 lead inhibitors"
  description: >-
    Built a computational discovery pipeline combining genome mining,
    molecular docking, and ML scoring to identify antifungal candidates
    from Streptomyces targeting scytalone dehydratase, a virulence enzyme
    in the rice blast pathogen Magnaporthe oryzae. Ran docking and
    molecular dynamics simulations (AutoDock, GROMACS; RMSD/RMSF
    stability analysis) and applied ensemble scoring models (Rscoring,
    Kdeep, Gnina) to flag two promising inhibitor candidates, Cremomycin
    and Azetidomonamide B, an early demonstration of pairing wet-lab
    biology intuition with computational screening.
  links:
    - label: "Publication"
      url: "https://www.researchgate.net/publication/395424172_Genome_mining_of_secondary_metabolites_from_Streptomyces_spp_for_the_screening_of_novel_and_potent_fungicide_Focus_on_rice_blast_disease"
