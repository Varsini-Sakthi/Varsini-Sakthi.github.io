- title: "SpatialFormer"
  subtitle: "Spatially-aware transformer for cell state prediction"
  tags: ["AI/ML", "spatial transcriptomics", "computational biology"]
  metric: "89.1% val. accuracy"
  description: >-
    Designed and trained a transformer that jointly encodes each 10x Visium
    spot with its six spatial neighbors, using additive expression,
    coordinate, and token-type embeddings through a 2-layer, 4-head
    encoder. Reached 89.1% validation accuracy on 10x mouse brain data
    (2,796 spots, 2,000 HVGs) and deployed a live inference app on Hugging
    Face Spaces with attention and gene-saliency interpretability, end to
    end from architecture design to public deployment.
  links:
    - label: "Live demo"
      url: "https://huggingface.co/spaces/Varsini-Sakthi/Spatialformer"
    - label: "GitHub"
      url: "https://github.com/Varsini-Sakthi"

- title: "Microglial Transcriptional Heterogeneity"
  subtitle: "Pseudobulk scRNA-seq across five developmental stages"
  tags: ["computational biology", "bioinformatics", "neurodegeneration"]
  metric: "4 programmes identified"
  description: >-
    End-to-end pseudobulk RNA-seq pipeline built with Dr. Maide Ozen (Johns
    Hopkins School of Medicine) characterizing microglial transcriptional
    heterogeneity across five developmental stages (E17–P60). Combines
    z-scored gene module scoring, PCA, differential expression, and
    pseudotime trajectory inference to identify four transcriptional
    programmes with stage-specific regulatory transitions relevant to
    neuroinflammation and brain maturation.
  links:
    - label: "GitHub"
      url: "https://github.com/Varsini-Sakthi"

- title: "scVI vs. PCA Benchmarking"
  subtitle: "Representation learning for single-cell data"
  tags: ["AI/ML", "data science", "single-cell"]
  metric: "LR: 95.1% vs. 91.4%"
  description: >-
    Trained a deep generative model (scVI VAE) on 12,012 PBMC single cells
    to learn 30-dimensional latent embeddings for UMAP visualization,
    Leiden clustering, and annotation of 12 PBMC populations. Benchmarked
    against PCA using shared train/test splits, logistic regression, and a
    PyTorch MLP: PCA outperformed scVI on classification accuracy (95.1%
    vs. 91.4%; 5-fold CV 88.6% vs. 86.1%), while scVI produced more
    biologically coherent latent structure, evidence that strong linear
    baselines can rival deep generative models on single-batch data.
  links:
    - label: "GitHub"
      url: "https://github.com/Varsini-Sakthi"

- title: "Brain Tumor MRI Classification"
  subtitle: "Radiomics with interpretable ML"
  tags: ["AI/ML", "data science", "medical imaging"]
  metric: "XGBoost: 97.4% accuracy"
  description: >-
    End-to-end ML pipeline for multiclass brain tumor classification from
    MRI radiomics features. Trained Logistic Regression, Random Forest, and
    XGBoost with RandomizedSearchCV tuning and 5-fold cross-validation
    (XGBoost 97.4%, Random Forest 95.5%), then applied SHAP to surface the
    most predictive radiomic features driving each prediction.
  links:
    - label: "GitHub"
      url: "https://github.com/Varsini-Sakthi"

- title: "Genome Mining of Streptomyces Metabolites"
  subtitle: "ML-driven antifungal drug discovery"
  tags: ["wet lab", "computational biology", "drug discovery"]
  metric: "Published · 2 lead inhibitors"
  description: >-
    Built a computational discovery pipeline combining genome mining,
    molecular docking, and ML scoring to identify antifungal candidates
    from Streptomyces targeting scytalone dehydratase, a virulence enzyme
    in the rice blast pathogen Magnaporthe oryzae. Ran docking and
    molecular dynamics simulations (AutoDock, GROMACS; RMSD/RMSF
    stability analysis) and applied ensemble scoring models (Rscoring,
    Kdeep, Gnina) to flag two promising inhibitor candidates, Cremomycin
    and Azetidomonamide B, an early demonstration of pairing wet-lab
    biology intuition with computational screening.
  links:
    - label: "Publication"
      url: "https://www.researchgate.net/publication/395424172_Genome_mining_of_secondary_metabolites_from_Streptomyces_spp_for_the_screening_of_novel_and_potent_fungicide_Focus_on_rice_blast_disease"
