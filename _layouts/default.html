<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}{% if page.title %} · {{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

  <div class="field" id="field" aria-hidden="true"></div>

  <header class="site-header">
    <a class="brand" href="{{ '/' | relative_url }}">Varsini Sakthi</a>
    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}#research">Research</a>
      <a href="{{ '/' | relative_url }}#projects">Projects</a>
      <a href="{{ '/' | relative_url }}#background">Background</a>
      <a href="{{ '/cv/' | relative_url }}">CV</a>
      <a href="{{ '/' | relative_url }}#contact">Contact</a>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <span>&copy; {{ 'now' | date: "%Y" }} Varsini Sakthi</span>
    <span class="footer-links">
      <a href="mailto:{{ site.email }}">Email</a>
      <a href="{{ site.linkedin_url }}">LinkedIn</a>
      <a href="https://github.com/{{ site.github_username }}">GitHub</a>
    </span>
  </footer>

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
